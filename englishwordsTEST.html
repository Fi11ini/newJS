<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      const words = [
        {
          origin: "Wassup",
          translation: "Здарова",
        },
        {
          original: "Bye",
          translation: "Покеда",
        },
        {
          original: "Programmer",
          translation: "Программист",
        },
      ];

      const notificationMessages = {
        start: {
          hello: "Hello Bro",
        },
        result: {
          finishSuccess: "Молодец. Good result!",
          finishUnsuccess: "Молодец. Но постарайся лучше!",
        },
      };

      const settings = {
        correctAnswersMinPercent: 50,
      };

      const result = {
        correctAnswersCount: 0,
      };

      //-----------------------------------------
      document.write(notificationMessages.start.hello);

      for (let i = 0; i < words.length; i++) {
        let userAnswer = prompt(words[i].origin); //0
        alert(userAnswer === words[i].translation);
        if (userAnswer === words[i].translation) {
          result.correctAnswersCount = result.correctAnswersCount + 1;
        }
      }

      const userCorrectAnswersMinPercent =
        (result.correctAnswersCount / words.length) * 100;

      if (userCorrectAnswersMinPercent > settings.correctAnswersMinPercent) {
        alert(notificationMessages.result.finishSuccess);
      } else {
        alert(notificationMessages.result.finishUnsuccess);
      }
    </script>
  </body>
</html>
