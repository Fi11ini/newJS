<html lang="en">

<head>

<body>








    <script>
        let balance = 130;
        
        
        //=====================================
        document.write('START', '<br>');


        let productPrice = window.prompt('How does much product cost?')

        if (balance >= productPrice) {
            document.write('Product puschased');
            document.write('<br>','Your balance:',balance - productPrice);
        } else {
            document.write('Not enough money')
        }

        const product2Price = window.prompt('How does much product cost?')

        if (balance >= product2Price) {
            document.write('<br>', 'Product puschased');
            document.write('<br>','Your balance:', balance - productPrice - product2Price,);
        } else {
            document.write('Not enough monye')
        }

            const product3Price = window.prompt('How does much product cost?')

            if (balance >= product3Price) {
                document.write('<br>', 'Product puschased');
                document.write('<br>', 'Your balance:', balance - productPrice - product2Price - product3Price,);
            } else {
                document.write('Not enough monye')
            }


        document.write('<br>', 'END');

    </script>

</body>
