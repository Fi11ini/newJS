
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>










<script>

    const word0 = {
        origin: 'Wassup',
        translation: 'Здарова'
    }


    const word1 = {
        original: 'Bye',
        translation: 'Покеда'
    }

    const word2 = {
        original: 'Programmer',
        translation: 'Программист'
        
    }
    

    const wordsCount = 3;

    const resultMessages = {
        finishSuccess: 'Молодец. Good result!',
        finishUnsuccess: 'Молодец. Но постарайся лучше!'
    }

    const settings = {
        correctAnswersMinPercent: 50 
    }


    const result = {
        correctAnswersCount: 0
    }
    




 //-----------------------------------------


const userAnswer0 = prompt(word0.origin); //0
alert(userAnswer0 === word0.translation);
if (userAnswer0 ===word0.translation) {
    result.correctAnswersCount = result.correctAnswersCount + 1;
}


const userAnswer1 = prompt(word1.original); //1
alert(userAnswer1 === word1.translation );
if (userAnswer1 ===word1.translation) {
    result.correctAnswersCount = result.correctAnswersCount + 1;
}

const userAnswer2 = prompt(word2.original); //2
alert(userAnswer2 === word2.translation );
if (userAnswer2 ===word2.translation) {
    result.correctAnswersCount = result.correctAnswersCount + 1;
}

const userCorrectAnswersMinPercent = result.correctAnswersCount / wordsCount * 100;

if (userCorrectAnswersMinPercent > settings.correctAnswersMinPercent) {
    alert(resultMessages.finishSuccess);
} else {
    alert(resultMessages.finishUnsuccess);
}





</script>
    
</body>
</html>
